name: MacOsMixer
options:
  bundleIdPrefix: com.macmixer
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.2"

targets:
  MacOsMixer:
    type: application
    platform: macOS
    sources:
      - path: MacOsMixer
        excludes:
          - "Audio/AudioPropertyBridge.m"
      - path: MacOsMixer/Audio/AudioPropertyBridge.m
        compilerFlags: "-fno-objc-arc"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macmixer.audiomixer
        INFOPLIST_FILE: MacOsMixer/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacOsMixer/MacOsMixer.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: MacOsMixer/Audio/MacOsMixer-Bridging-Header.h
        PRODUCT_NAME: MacOs Mixer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - sdk: ServiceManagement.framework
    entitlements:
      path: MacOsMixer/MacOsMixer.entitlements
      properties:
        com.apple.security.device.audio-input: true
